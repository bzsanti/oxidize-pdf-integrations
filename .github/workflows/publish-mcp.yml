name: Publish MCP Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must already exist on PyPI as oxidize-pdf==X.Y.Z)"
        required: true
        type: string

permissions:
  id-token: write   # github-oidc login
  contents: read

env:
  MCP_PUBLISHER_VERSION: "1.7.8"

jobs:
  publish:
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify oxidize-pdf is published on PyPI
        run: |
          set -euo pipefail
          if ! curl -sf "https://pypi.org/pypi/oxidize-pdf/${RELEASE_VERSION}/json" -o /dev/null; then
            echo "::error::oxidize-pdf ${RELEASE_VERSION} not found on PyPI. Publish the PyPI release in oxidize-python first."
            exit 1
          fi
          echo "Confirmed oxidize-pdf ${RELEASE_VERSION} is published on PyPI."

      - name: Patch mcp/server.json version fields
        working-directory: mcp
        run: |
          set -euo pipefail
          jq --arg v "$RELEASE_VERSION" \
            '.version = $v | .packages[0].version = $v' \
            server.json > server.json.tmp
          mv server.json.tmp server.json
          echo "── Patched server.json ──"
          cat server.json

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            -o mcp-publisher.tar.gz
          tar -xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher
          ./mcp-publisher --version

      - name: Validate server.json
        working-directory: mcp
        run: ../mcp-publisher validate

      - name: Login (GitHub Actions OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: mcp
        run: ../mcp-publisher publish

      - name: Verify registry shows new version
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            CURRENT=$(curl -sf "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.bzsanti%2Foxidize-pdf-mcp" \
              | jq -r '.servers[0].version // empty')
            if [ "$CURRENT" = "$RELEASE_VERSION" ]; then
              echo "Registry confirms ${CURRENT}."
              exit 0
            fi
            echo "Attempt ${attempt}: registry shows '${CURRENT:-<missing>}', expected '${RELEASE_VERSION}'. Waiting 10s..."
            sleep 10
          done
          echo "::error::Registry did not surface ${RELEASE_VERSION} after ~50 seconds."
          exit 1
