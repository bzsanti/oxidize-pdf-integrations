name: Release — LlamaIndex Reader

# Triggered by tags like llamaindex-v0.1.0. Builds the llamaindex/
# sub-package and publishes to PyPI via OIDC trusted publisher.
#
# Setup required once per integration (see RELEASING.md):
#   - PyPI pending publisher for project "llama-index-readers-oxidize-pdf":
#       owner=bzsanti, repo=oxidize-pdf-integrations,
#       workflow=release-llamaindex.yml, environment=pypi
#   - GitHub environment named "pypi" in repo Settings → Environments

on:
  push:
    tags:
      - "llamaindex-v*"

permissions:
  contents: read

jobs:
  release:
    name: Build and publish llama-index-readers-oxidize-pdf
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: llamaindex
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag matches pyproject.toml version
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${TAG_REF#llamaindex-v}"
          pyproject_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::Tag version '$tag_version' does not match pyproject.toml version '$pyproject_version'. Fix the version in pyproject.toml or retag."
            exit 1
          fi
          echo "Tag and pyproject agree on version $tag_version"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build pkginfo

      - name: Build sdist and wheel
        run: python -m build

      - name: Smoke-check artefact metadata
        run: |
          set -euo pipefail
          ls -1 dist/
          python -c "
          import pkginfo, pathlib
          wheels = sorted(pathlib.Path('dist').glob('*.whl'))
          assert wheels, 'no wheel produced'
          meta = pkginfo.Wheel(str(wheels[0]))
          assert meta.name == 'llama-index-readers-oxidize-pdf', meta.name
          print('wheel:', wheels[0].name, 'version:', meta.version)
          "

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: llamaindex/dist
